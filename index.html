<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ric Pac Soe</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;height:100%;font-family:'Orbitron',sans-serif;background:#000;color:#fff;touch-action:manipulation}
#titleScreen,#game{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}
#game{display:none}

h1{font-size:clamp(36px,8vw,64px);margin-bottom:20px;letter-spacing:4px;text-align:center}

.control-group{margin:8px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
label{font-size:12px;opacity:0.7}
select{padding:10px 14px;border-radius:10px;border:none;background:#111;color:#fff;font-size:14px}

button{margin:4px;padding:14px 16px;border:none;border-radius:12px;background:linear-gradient(45deg,#ff00cc,#3333ff);color:#fff;font-size:16px;cursor:pointer}
button:active{transform:scale(0.95)}
button.active{background:linear-gradient(45deg,#00ffcc,#ffcc00)}
.dark{background:#444}

.start-buttons{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

.board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:min(90vw,360px);margin-top:16px}
.cell{aspect-ratio:1;border:3px solid #30e3ca;display:flex;align-items:center;justify-content:center;font-size:clamp(28px,8vw,40px);border-radius:12px}
.cell.X{background:#ffd60a}.cell.O{background:#006400}

#overlay{position:absolute;width:100%;height:100%;display:none;align-items:center;justify-content:center;flex-direction:column;font-size:clamp(32px,8vw,48px);font-family:'Orbitron';text-align:center;padding:20px;box-sizing:border-box}

#infoBox{position:absolute;bottom:8px;width:90%;max-width:600px;font-size:11px;opacity:0.8;line-height:1.4}

#controls{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:10px}
#controls button{flex:1 1 22%;min-width:60px}

#bottomActions{display:flex;gap:10px;margin-top:10px}
#bottomActions button{flex:1}
</style>
</head>
<body>

<div id="titleScreen">
<h1>Ric Pac Soe</h1>

<div class="control-group">
<label>ゲームモード</label>
<select id="winMode">
<option value="three">三目並べ（先手一列）</option>
<option value="war">九目並べ（一色制圧）</option>
</select>
</div>

<div class="control-group">
<label>対戦モード</label>
<select id="opponent">
<option value="ai" selected>AI対戦</option>
<option value="pvp">練習/ローカル対戦</option>
</select>
</div>

<div class="start-buttons">
<button onclick="startGame('X')">先手でSTART</button>
<button class="dark" onclick="startGame('O')">後手でSTART</button>
</div>

<div id="infoBox">
「Ric Pac Soe」は「三目並べ（tic-tac-toe）」と「じゃんけん（rock-paper-scissors）」を組み合わせたオリジナルゲーム。〇×の代わりに設置するのは、グー🪨チョキ✂️パー📜。ターンが来たら、新たにマークを設置するか、隣接するマークを攻撃して、自分の色に塗り替えろ。アイコの場合マークは対消滅し、新たなマークを設置するボーナスが得られる。さあ、最短手数でAIを塗りつぶせ。<br>
<p style="color:#00daff">
<a href="https://github.com/naoyasnow/ric-pac-soe/" style="color:#00daff">README</a>
</p>
developed by @naoyasnow Last Updated 2026/3/28<br>
</div>

</div>

<div id="game">
<div id="controls">
<button id="rock" onclick="setHand('rock')">🪨</button>
<button id="scissors" onclick="setHand('scissors')">✂️</button>
<button id="paper" onclick="setHand('paper')">📜</button>
<button id="attack" onclick="setMode('attack')">攻撃</button>
<button onclick="passTurn()">パス</button>
</div>

<div class="board" id="board"></div>

<div id="bottomActions">
<button class="dark" onclick="giveUp()">降参</button>
<button class="dark" onclick="back()">タイトルへ戻る</button>
</div>

<div id="overlay"></div>
</div>

<script>
let board,current,mode='place',hand='rock',opponent,selected,gameOver=false,bonus=false,bonusOwner=null,lastStarter='X',moveCount=0;

function startGame(st){
 moveCount=0;
 lastStarter=st;
 board=Array(9).fill(null);
 current=st;
 opponent=document.getElementById('opponent').value;
 gameOver=false;bonus=false;bonusOwner=null;
 document.getElementById('titleScreen').style.display='none';
 document.getElementById('game').style.display='flex';
 document.getElementById('overlay').style.display='none';
 render();
 if(opponent==='ai' && current==='O') setTimeout(()=>aiMove(),150);
}

function back(){
 document.getElementById('game').style.display='none';
 document.getElementById('titleScreen').style.display='flex';
}

function setActive(id){
 ['rock','scissors','paper','attack'].forEach(b=>{
  const el=document.getElementById(b);
  if(el) el.classList.remove('active');
 });
 if(id){
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
 }
}

function setHand(h){hand=h;mode='place';setActive(h)}
function setMode(m){mode=m;setActive('attack')}

function render(){
 let info=document.getElementById('moveCounter');
 if(!info){
  info=document.createElement('div');
  info.id='moveCounter';
  info.style.marginTop='6px';
  info.style.fontSize='14px';
  document.getElementById('game').prepend(info);
 }
 info.textContent=`手数: ${moveCount}`;

 const b=document.getElementById('board');
 if(!b)return;
 b.innerHTML='';
 board.forEach((c,i)=>{
  let d=document.createElement('div');
  d.className='cell';
  if(c){d.classList.add(c.p);d.textContent=emoji(c.h)}
  d.onclick=()=>click(i);
  b.appendChild(d);
 });
}

function emoji(h){return h==='rock'?'🪨':h==='scissors'?'✂️':'📜'}

function click(i){
 if(gameOver)return;
 if(bonus && current!==bonusOwner)return;

 if(mode==='place'){
  if(board[i])return;
  board[i]={p:current,h:hand};
  if(bonus){bonus=false;bonusOwner=null;next();return;}
  next();
 }else{
  if(selected==null){if(board[i]?.p===current)selected=i}
  else{
   if(adj(selected,i)&&board[i]&&board[i].p!==current){
    let a=board[selected].h,b=board[i].h;
    if(a===b){
      board[selected]=null;board[i]=null;
      bonus=true;bonusOwner=current;
      mode='place';selected=null;render();return;
    }else if(win(a,b)) board[i]={p:current,h:a};
    else board[selected]=null;
    selected=null;next();
   }else selected=null;
  }
 }
 render();
}

function passTurn(){next()}
function giveUp(){end(current==='X'?'O':'X')}

function adj(a,b){let ax=a%3,ay=(a/3|0),bx=b%3,by=(b/3|0);return Math.abs(ax-bx)<=1&&Math.abs(ay-by)<=1&&a!==b}
function win(a,b){return a==='rock'&&b==='scissors'||a==='scissors'&&b==='paper'||a==='paper'&&b==='rock'}

function next(){
 moveCount++;
 if(check())return;
 current=current==='X'?'O':'X';
 render();
 if(opponent==='ai' && current==='O' && !gameOver) setTimeout(()=>aiMove(),120);
}

function check(){
 let mode=document.getElementById('winMode').value;
 if(mode==='three'){
  let p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(let [a,b,c] of p){
   if(board[a]&&board[a].p===board[b]?.p&&board[a].p===board[c]?.p){end(board[a].p);return true}
  }
 }
 if(mode==='war'){
  if(board.every(cell=>cell!==null)){
   let first=board[0].p;
   if(board.every(cell=>cell.p===first)){end(first);return true}
  }
 }
 return false;
}

function end(p){
 gameOver=true;
 let o=document.getElementById('overlay');
 o.style.display='flex';
 o.style.background=p==='X'?'#ffd60a':'#003300';
 o.innerHTML=`<div>${p==='X'?'WIN':'LOSE'}</div>
 <div style="font-size:18px;margin:10px">手数: ${moveCount}</div>
 <button onclick="startGame('${lastStarter}')">もう一度対戦</button>
 <button onclick="back()">タイトルへ戻る</button>`;
}

function aiMove(){
 if(gameOver)return;
 let best=-Infinity,move=null;
 let actions=getActions('O');
 for(let act of actions){
  let b=simulate(board,act,'O');
  let score=minimax(b,3,false);
  if(score>best){best=score;move=act}
 }
 if(move) apply(move);
}

function minimax(b,d,isMax){
 if(d===0)return evaluate(b);
 let player=isMax?'O':'X';
 let acts=getActions(player,b);
 return isMax?
  Math.max(...acts.map(a=>minimax(simulate(b,a,player),d-1,false))):
  Math.min(...acts.map(a=>minimax(simulate(b,a,player),d-1,true)));
}

function evaluate(b){
 let s=0,count={rock:0,scissors:0,paper:0};
 b.forEach(c=>{if(!c)return;if(c.p==='O')s+=15;else s-=15;count[c.h]++});
 let v=Object.values(count);
 s-=(Math.max(...v)-Math.min(...v));
 s+=countAttacks(b,'O')*3;
 s-=countAttacks(b,'X')*3;
 return s;
}

function countAttacks(b,p){
 let c=0;
 b.forEach((cell,i)=>{
  if(cell?.p===p){
   b.forEach((t,j)=>{
    if(adj(i,j)&&t&&t.p!==p&&win(cell.h,t.h))c++;
   })
  }
 });
 return c;
}

function getLeastUsedHand(b){
 let count={rock:0,scissors:0,paper:0};
 b.forEach(c=>{if(c)count[c.h]++});
 return Object.entries(count).sort((a,b)=>a[1]-b[1])[0][0];
}

function getActions(p,b=board){
 let acts=[];
 b.forEach((c,i)=>{
  if(!c)acts.push({type:'place',i});
  if(c?.p===p){
   b.forEach((t,j)=>{
    if(adj(i,j)&&t&&t.p!==p)acts.push({type:'attack',from:i,to:j});
   })
  }
 });
 return acts;
}

function simulate(b,a,p){
 let nb=b.map(v=>v?{...v}:null);
 if(a.type==='place'){
  let h=getLeastUsedHand(nb);
  nb[a.i]={p,h};
 }else{
  let A=nb[a.from],B=nb[a.to];
  if(A.h===B.h){nb[a.from]=null;nb[a.to]=null}
  else if(win(A.h,B.h))nb[a.to]={p,h:A.h};
  else nb[a.from]=null;
 }
 return nb;
}

function apply(a){
 if(a.type==='place'){
  let h=getLeastUsedHand(board);
  board[a.i]={p:'O',h};
 }else{
  selected=a.from;mode='attack';click(a.to);return;
 }
 next();
}

// basic sanity tests
console.assert(typeof startGame==='function','startGame missing');
console.assert(Array.isArray(Array(9).fill(null)),'board init failed');
</script>
</body>
</html>
